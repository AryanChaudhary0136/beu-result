<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BEU Result Viewer</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f0f2f5;
    color: #1a1a1a;
    padding: 20px;
  }
  .container {
    max-width: 900px;
    margin: 0 auto;
  }
  .card {
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    padding: 24px;
    margin-bottom: 20px;
  }
  h1 {
    text-align: center;
    color: #1a3c8c;
    font-size: 22px;
    margin: 0 0 4px;
  }
  .subtitle {
    text-align: center;
    color: #555;
    margin-bottom: 20px;
    font-size: 14px;
  }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .form-grid .full { grid-column: 1 / -1; }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 5px;
    color: #333;
  }
  input, select {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
  }
  input:focus, select:focus {
    outline: none;
    border-color: #1a3c8c;
  }
  button {
    margin-top: 16px;
    width: 100%;
    padding: 12px;
    background: #1a3c8c;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #142f6e; }
  button:disabled { background: #999; cursor: not-allowed; }

  .error-box {
    background: #fde8e8;
    border: 1px solid #f5b5b5;
    color: #a31515;
    padding: 12px;
    border-radius: 6px;
    margin-bottom: 16px;
    font-size: 14px;
  }

  .result-header {
    text-align: center;
    margin-bottom: 16px;
  }
  .result-header h2 {
    color: #1a3c8c;
    margin: 0 0 2px;
    font-size: 19px;
  }
  .result-header .uni-sub {
    font-size: 13px;
    color: #555;
  }

  table.info-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 18px;
    font-size: 14px;
  }
  table.info-table td {
    border: 1px solid #ddd;
    padding: 8px 10px;
  }
  table.info-table td.label {
    font-weight: 600;
    background: #f7f8fa;
    width: 28%;
  }

  h3.section-title {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #777;
    margin: 18px 0 8px;
    border-bottom: 1px solid #eee;
    padding-bottom: 4px;
  }

  table.marks-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    margin-bottom: 10px;
  }
  table.marks-table th, table.marks-table td {
    border: 1px solid #ddd;
    padding: 8px 10px;
    text-align: center;
  }
  table.marks-table th {
    background: #1a3c8c;
    color: #fff;
    font-size: 13px;
  }
  table.marks-table td.subject-name {
    text-align: left;
  }
  table.marks-table td.grade-F {
    color: #c0392b;
    font-weight: 700;
  }
  table.marks-table td.grade-pass {
    color: #1a7a32;
    font-weight: 600;
  }

  table.sgpa-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin-bottom: 10px;
  }
  table.sgpa-table th, table.sgpa-table td {
    border: 1px solid #ddd;
    padding: 7px;
    text-align: center;
  }
  table.sgpa-table th {
    background: #f7f8fa;
  }

  .remarks {
    margin-top: 14px;
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
  }
  .remarks.pass {
    background: #e9f7ef;
    color: #1a7a32;
  }
  .remarks.fail {
    background: #fde8e8;
    color: #a31515;
  }

  .note {
    margin-top: 16px;
    font-size: 12px;
    color: #888;
    line-height: 1.6;
  }

  .loader {
    text-align: center;
    padding: 30px;
    color: #555;
  }

  .raw-box {
    background: #f7f8fa;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 12px;
    font-size: 12px;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <h1>BEU Result Viewer</h1>
    <div class="subtitle">Bihar Engineering University, Patna &mdash; Student Result Portal</div>

    <form id="resultForm">
      <div class="form-grid">
        <div class="full">
          <label for="redg_no">Registration Number</label>
          <input type="text" id="redg_no" placeholder="e.g. 23155150021" required pattern="\d{5,20}" />
        </div>

        <div>
          <label for="semester">Semester</label>
          <select id="semester" required>
            <option value="">Select Semester</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
          </select>
        </div>

        <div>
          <label for="exam_year">Exam Year</label>
          <input type="number" id="exam_year" placeholder="e.g. 2025" min="2015" max="2035" required />
        </div>

        <div class="full">
          <label for="exam_month">Exam Month</label>
          <select id="exam_month" required>
            <option value="">Select Month</option>
            <option>January</option>
            <option>February</option>
            <option>March</option>
            <option>April</option>
            <option>May</option>
            <option>June</option>
            <option>July</option>
            <option>August</option>
            <option>September</option>
            <option>October</option>
            <option>November</option>
            <option>December</option>
          </select>
        </div>
      </div>

      <button type="submit" id="submitBtn">Get Result</button>
    </form>
  </div>

  <div id="output"></div>
</div>

<script>
const form = document.getElementById('resultForm');
const output = document.getElementById('output');
const submitBtn = document.getElementById('submitBtn');

const MONTHS = {
  January: '01', February: '02', March: '03', April: '04',
  May: '05', June: '06', July: '07', August: '08',
  September: '09', October: '10', November: '11', December: '12'
};

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const redg_no = document.getElementById('redg_no').value.trim();
  const semester = document.getElementById('semester').value;
  const exam_month = document.getElementById('exam_month').value;
  const exam_year = document.getElementById('exam_year').value.trim();

  if (!redg_no || !semester || !exam_month || !exam_year) {
    output.innerHTML = `<div class="card"><div class="error-box">Please fill all fields.</div></div>`;
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Fetching...';
  output.innerHTML = `<div class="card"><div class="loader">Fetching result, please wait...</div></div>`;

  try {
    const params = new URLSearchParams({
      redg_no, semester, exam_month, exam_year
    });
    const res = await fetch(`/api/result?${params.toString()}`);
    const json = await res.json();

    if (!res.ok) {
      output.innerHTML = `<div class="card"><div class="error-box">${escapeHtml(json.error || 'Something went wrong.')}</div></div>`;
      return;
    }

    renderResult(json.data);
  } catch (err) {
    output.innerHTML = `<div class="card"><div class="error-box">Network error: ${escapeHtml(String(err))}</div></div>`;
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Get Result';
  }
});

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function renderResult(data) {
  // If BEU API returned something unexpected / raw text, show it for debugging
  if (!data || data.raw || data.error) {
    output.innerHTML = `
      <div class="card">
        <div class="error-box">Could not parse a structured result. Raw response below (this usually means the registration number / semester / exam period didn't match, or the BEU API response shape is different than expected).</div>
        <div class="raw-box">${escapeHtml(JSON.stringify(data, null, 2))}</div>
      </div>`;
    return;
  }

  // Try to locate the actual result payload - BEU API shape may vary,
  // so we defensively look in common places.
  const result = data.data || data.result || data;

  const student = result.student || result.studentInfo || result;
  const theory = result.theory || result.theorySubjects || [];
  const practical = result.practical || result.practicalSubjects || [];
  const sgpaRow = result.sgpa || result.sgpaCgpa || null;
  const remarks = result.remarks || result.remark || '';

  let html = '<div class="card">';

  html += `
    <div class="result-header">
      <h2>BIHAR ENGINEERING UNIVERSITY, PATNA</h2>
      <div class="uni-sub">B.Tech Semester Examination Result</div>
    </div>`;

  html += `<table class="info-table"><tbody>`;
  html += infoRow('Registration No', student.redg_no || student.registration_no || student.reg_no);
  html += infoRow('Student Name', student.name || student.student_name);
  html += infoRow("Father's Name", student.father_name || student.fathers_name);
  html += infoRow("Mother's Name", student.mother_name || student.mothers_name);
  html += infoRow('College Name', student.college_name || student.college);
  html += infoRow('Course Name', student.course_name || student.course);
  html += infoRow('Semester', student.semester || result.semester);
  html += `</tbody></table>`;

  if (Array.isArray(theory) && theory.length) {
    html += `<h3 class="section-title">Theory</h3>`;
    html += renderMarksTable(theory);
  }

  if (Array.isArray(practical) && practical.length) {
    html += `<h3 class="section-title">Practical</h3>`;
    html += renderMarksTable(practical);
  }

  if (sgpaRow) {
    html += `<h3 class="section-title">SGPA / CGPA</h3>`;
    html += renderSgpaTable(sgpaRow);
  }

  if (remarks) {
    const isFail = /fail/i.test(remarks);
    html += `<div class="remarks ${isFail ? 'fail' : 'pass'}">Remarks: ${escapeHtml(String(remarks))}</div>`;
  }

  html += `
    <div class="note">
      ESE: End Semester Exam &middot; IA: Internal Assessment &middot; SGPA: Semester Grade Point Average &middot; CGPA: Cumulative Grade Point Average<br/>
      This is an unofficial viewer fetching data from the BEU result API. Not valid for official purposes.
    </div>`;

  html += '</div>';

  // Also show raw JSON in a collapsible-style box for transparency / debugging
  html += `
    <div class="card">
      <h3 class="section-title">Raw API Response</h3>
      <div class="raw-box">${escapeHtml(JSON.stringify(data, null, 2))}</div>
    </div>`;

  output.innerHTML = html;
}

function infoRow(label, value) {
  return `<tr><td class="label">${escapeHtml(label)}</td><td>${escapeHtml(value ?? '-')}</td></tr>`;
}

function renderMarksTable(subjects) {
  let html = `<table class="marks-table"><thead><tr>
    <th>Code</th><th>Subject</th><th>ESE</th><th>IA</th><th>Total</th><th>Grade</th><th>Credit</th>
  </tr></thead><tbody>`;

  subjects.forEach(sub => {
    const grade = sub.grade || sub.Grade || '';
    const gradeClass = grade === 'F' ? 'grade-F' : (grade ? 'grade-pass' : '');
    html += `<tr>
      <td>${escapeHtml(sub.code || sub.subject_code || '-')}</td>
      <td class="subject-name">${escapeHtml(sub.name || sub.subject_name || '-')}</td>
      <td>${escapeHtml(sub.ese ?? sub.ESE ?? '-')}</td>
      <td>${escapeHtml(sub.ia ?? sub.IA ?? '-')}</td>
      <td>${escapeHtml(sub.total ?? sub.Total ?? '-')}</td>
      <td class="${gradeClass}">${escapeHtml(grade || '-')}</td>
      <td>${escapeHtml(sub.credit ?? sub.Credit ?? '-')}</td>
    </tr>`;
  });

  html += `</tbody></table>`;
  return html;
}

function renderSgpaTable(sgpaRow) {
  // sgpaRow expected to be an object like { I: 6.71, II: 6.14, ..., curCgpa: 6.39 }
  // or an array of {semester, sgpa}. Handle both defensively.
  const semesters = ['I','II','III','IV','V','VI','VII','VIII'];
  let html = `<table class="sgpa-table"><thead><tr><th></th>`;
  semesters.forEach(s => html += `<th>${s}</th>`);
  html += `<th>Cur. CGPA</th></tr></thead><tbody><tr><td>SGPA</td>`;

  if (Array.isArray(sgpaRow)) {
    semesters.forEach((s, idx) => {
      const entry = sgpaRow[idx];
      html += `<td>${escapeHtml(entry?.sgpa ?? entry?.value ?? '-')}</td>`;
    });
    html += `<td>${escapeHtml(sgpaRow.cgpa ?? '-')}</td>`;
  } else {
    semesters.forEach(s => {
      html += `<td>${escapeHtml(sgpaRow[s] ?? '-')}</td>`;
    });
    html += `<td>${escapeHtml(sgpaRow.curCgpa ?? sgpaRow.cgpa ?? '-')}</td>`;
  }

  html += `</tr></tbody></table>`;
  return html;
}
</script>

</body>
</html>
